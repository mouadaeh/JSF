<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Datatable</title>
</h:head>
<h:body>
    <h1>Liste des Étudiants</h1>
    <h:dataTable var="etudiant" value="#{etudiantBean.etudiants}" border="2" cellpadding="5" cellspacing="0">
        <h:column>
            #{etudiant.numero}
        </h:column>
        <h:column>
            #{etudiant.prenom}
        </h:column>
        <h:column>
            #{etudiant.nom}
        </h:column>
        <h:column>
            #{etudiant.email}
        </h:column>
    </h:dataTable>

    <h:form >
        <h:outputLabel for="nom" value="Nom" />
        <h:inputText id="nom" value="#{etudiant.nom}" />

        <h:outputLabel for="prenom" value="Prenom" />
        <h:inputText id="prenom" value="#{etudiant.prenom}" />

        <h:outputLabel for="email" value="Email" />
        <h:inputText id="email" value="#{etudiant.email}" />
    </h:form>

</h:body>
</html>
